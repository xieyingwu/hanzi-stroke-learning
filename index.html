<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🐼 汉字笔顺学堂</title>
  <!-- Hanzi Writer — 权威笔顺数据库 -->
  <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
  <style>
    /* ===== 全局重置 & 基础样式 ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg-sky: #E8F6FF;
      --yellow: #FFD93D;
      --orange: #FF8C42;
      --red: #FF5A5F;
      --green: #6BCB77;
      --blue: #4D96FF;
      --purple: #C77DFF;
      --pink: #FF85A1;
      --dark: #3A3A5C;
      --mid: #7B7B9A;
      --light: #B8B8D0;
      --white: #FFFFFF;
      --card-shadow: 0 8px 24px rgba(77,150,255,0.15);
      --bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    html, body {
      height: 100%;
      font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: var(--bg-sky);
      color: var(--dark);
      overflow-x: hidden;
    }

    /* 动态云朵背景 */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        radial-gradient(ellipse 200px 80px at 10% 15%, rgba(255,255,255,0.8) 0%, transparent 70%),
        radial-gradient(ellipse 160px 60px at 80% 8%, rgba(255,255,255,0.7) 0%, transparent 70%),
        radial-gradient(ellipse 120px 50px at 50% 5%, rgba(255,255,255,0.6) 0%, transparent 70%),
        linear-gradient(180deg, #C8E6FF 0%, #E8F6FF 40%, #FFF5E6 100%);
      z-index: 0;
      pointer-events: none;
    }

    /* ===== 顶部导航 ===== */
    .top-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: linear-gradient(135deg, #FF85A1 0%, #FF8C42 50%, #FFD93D 100%);
      padding: 12px 16px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 4px 16px rgba(255,140,66,0.35);
      border-radius: 0 0 24px 24px;
    }
    .nav-title {
      font-size: 22px;
      font-weight: 900;
      color: white;
      text-shadow: 2px 3px 0px rgba(0,0,0,0.15);
      letter-spacing: 1px;
    }
    .nav-title span { font-size: 26px; }
    .stars-display {
      display: flex;
      align-items: center;
      gap: 4px;
      background: rgba(255,255,255,0.3);
      border-radius: 20px;
      padding: 4px 12px;
    }
    .stars-display .star-icon { font-size: 18px; }
    .stars-display .star-count {
      font-size: 18px;
      font-weight: 900;
      color: white;
      text-shadow: 1px 1px 0 rgba(0,0,0,0.2);
    }

    /* ===== 进度条 ===== */
    .progress-section {
      position: relative;
      z-index: 1;
      padding: 16px 16px 8px;
    }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      font-weight: 700;
      color: var(--mid);
      margin-bottom: 6px;
    }
    .progress-bar {
      height: 14px;
      background: rgba(255,255,255,0.8);
      border-radius: 7px;
      overflow: hidden;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.1);
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #6BCB77, #4D96FF);
      border-radius: 7px;
      transition: width 0.6s var(--bounce);
      position: relative;
      overflow: hidden;
    }
    .progress-fill::after {
      content: '';
      position: absolute;
      top: 2px; left: 0;
      width: 50%; height: 4px;
      background: rgba(255,255,255,0.5);
      border-radius: 2px;
    }

    /* ===== 分类选择器 ===== */
    .category-section {
      position: relative; z-index: 1;
      padding: 8px 16px 4px;
    }
    .section-title {
      font-size: 15px; font-weight: 800;
      color: var(--dark);
      margin-bottom: 10px;
      display: flex; align-items: center; gap: 6px;
    }
    .category-scroll {
      display: flex; gap: 10px;
      overflow-x: auto; padding-bottom: 8px;
      scrollbar-width: none;
    }
    .category-scroll::-webkit-scrollbar { display: none; }
    .cat-btn {
      flex-shrink: 0;
      padding: 8px 18px;
      border-radius: 20px;
      border: 2px solid transparent;
      font-size: 14px; font-weight: 700;
      cursor: pointer;
      transition: all 0.25s var(--bounce);
      white-space: nowrap;
    }
    .cat-btn.active {
      background: var(--blue); color: white;
      border-color: var(--blue);
      box-shadow: 0 4px 12px rgba(77,150,255,0.4);
      transform: translateY(-2px);
    }
    .cat-btn:not(.active) {
      background: white; color: var(--dark);
      border-color: #E0E0F0;
    }
    .cat-btn:active { transform: scale(0.93); }

    /* ===== 汉字网格 ===== */
    .hanzi-grid-section {
      position: relative; z-index: 1;
      padding: 8px 16px 12px;
    }
    .hanzi-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    .hanzi-card {
      aspect-ratio: 1;
      background: white;
      border-radius: 20px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      cursor: pointer;
      box-shadow: var(--card-shadow);
      border: 3px solid transparent;
      transition: all 0.25s var(--bounce);
      position: relative; overflow: hidden;
    }
    .hanzi-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      border-radius: 20px 20px 0 0;
    }
    .hanzi-card.color-1::before { background: #FF85A1; }
    .hanzi-card.color-2::before { background: #FFD93D; }
    .hanzi-card.color-3::before { background: #6BCB77; }
    .hanzi-card.color-4::before { background: #4D96FF; }
    .hanzi-card.color-5::before { background: #C77DFF; }
    .hanzi-card.color-6::before { background: #FF8C42; }
    .hanzi-card.learned {
      border-color: #6BCB77;
      background: linear-gradient(135deg, #F0FFF4, white);
    }
    .hanzi-card:active { transform: scale(0.88); }
    .hanzi-card:hover { transform: translateY(-4px) scale(1.04); box-shadow: 0 12px 32px rgba(77,150,255,0.25); }
    .card-char { font-size: 30px; font-weight: 900; color: var(--dark); line-height: 1; }
    .card-pinyin { font-size: 11px; color: var(--mid); margin-top: 3px; font-style: italic; }
    .card-badge { position: absolute; top: 6px; right: 6px; font-size: 14px; line-height: 1; }

    /* ===== 学习弹层 ===== */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,20,0.55);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.active { opacity: 1; pointer-events: all; }
    .modal-sheet {
      width: 100%; max-width: 480px;
      background: white;
      border-radius: 32px 32px 0 0;
      padding: 20px 20px 36px;
      transform: translateY(100%);
      transition: transform 0.45s var(--bounce);
      max-height: 92vh;
      overflow-y: auto;
    }
    .modal-overlay.active .modal-sheet { transform: translateY(0); }
    .modal-handle {
      width: 44px; height: 5px;
      background: #E0E0F0;
      border-radius: 3px;
      margin: 0 auto 16px;
    }
    .modal-header {
      display: flex; align-items: center; gap: 16px;
      margin-bottom: 18px;
    }
    .modal-char-big {
      width: 72px; height: 72px;
      border-radius: 18px;
      background: linear-gradient(135deg, #FFF5E6, #FFE8CC);
      display: flex; align-items: center; justify-content: center;
      font-size: 44px; font-weight: 900;
      color: var(--dark);
      box-shadow: 0 4px 16px rgba(255,140,66,0.25);
      flex-shrink: 0;
    }
    .modal-char-info h2 { font-size: 20px; font-weight: 900; color: var(--dark); }
    .pinyin-tag {
      display: inline-block;
      background: #E8F6FF; color: var(--blue);
      font-size: 14px; font-weight: 700;
      padding: 2px 10px; border-radius: 10px;
      margin-top: 4px;
    }
    .stroke-count-tag {
      display: inline-block;
      background: #FFF0F5; color: var(--pink);
      font-size: 13px; font-weight: 700;
      padding: 2px 10px; border-radius: 10px;
      margin-top: 4px; margin-left: 6px;
    }

    /* ===== 笔顺动画画布区 ===== */
    .stroke-canvas-wrap {
      background: linear-gradient(135deg, #FAFAFA, #F5F5FF);
      border-radius: 24px;
      padding: 16px;
      margin-bottom: 16px;
      border: 2px dashed #E0E0F0;
      display: flex; flex-direction: column;
      align-items: center;
    }
    .canvas-label {
      font-size: 13px; font-weight: 700;
      color: var(--mid); margin-bottom: 10px;
      display: flex; align-items: center; gap: 6px;
    }

    /* Hanzi Writer 容器 */
    #hanziWriterContainer {
      width: 220px; height: 220px;
      position: relative;
    }
    #hanziWriterContainer svg {
      width: 100% !important;
      height: 100% !important;
    }

    /* 田字格叠加层 */
    .tian-grid-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 220px; height: 220px;
      pointer-events: none;
    }

    /* 笔画序号指示 */
    .stroke-indicators {
      display: flex; gap: 6px;
      flex-wrap: wrap; justify-content: center;
      margin-top: 10px;
    }
    .stroke-dot {
      width: 26px; height: 26px;
      border-radius: 50%;
      background: #E8E8F0;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700;
      color: #AAA;
      transition: all 0.3s var(--bounce);
      flex-shrink: 0;
    }
    .stroke-dot.current {
      background: var(--red); color: white;
      transform: scale(1.2);
      box-shadow: 0 3px 10px rgba(255,90,95,0.4);
    }
    .stroke-dot.done { background: var(--green); color: white; }

    /* 进度提示 */
    #strokeStep {
      font-size: 13px; font-weight: 700;
      color: var(--red); margin-left: 6px;
    }

    /* ===== 控制按钮 ===== */
    .controls {
      display: flex; gap: 10px;
      justify-content: center;
      margin-bottom: 18px;
    }
    .ctrl-btn {
      flex: 1; max-width: 130px;
      padding: 13px 8px;
      border-radius: 16px; border: none;
      font-size: 15px; font-weight: 800;
      cursor: pointer;
      transition: all 0.2s var(--bounce);
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .ctrl-btn:active { transform: scale(0.92); }
    .btn-play {
      background: linear-gradient(135deg, #FF85A1, #FF5A5F);
      color: white;
      box-shadow: 0 6px 16px rgba(255,90,95,0.4);
    }
    .btn-prev { background: #F0F0FF; color: var(--dark); }
    .btn-next {
      background: linear-gradient(135deg, #6BCB77, #4D96FF);
      color: white;
      box-shadow: 0 6px 16px rgba(77,150,255,0.3);
    }
    .btn-reset { background: #FFF5E6; color: var(--orange); }

    /* ===== 记住了按钮 ===== */
    .remember-btn {
      width: 100%; padding: 16px;
      border-radius: 20px; border: none;
      background: linear-gradient(135deg, #FFD93D 0%, #FF8C42 100%);
      color: white;
      font-size: 18px; font-weight: 900;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(255,140,66,0.4);
      transition: all 0.2s var(--bounce);
      display: flex; align-items: center; justify-content: center; gap: 8px;
      text-shadow: 1px 1px 0 rgba(0,0,0,0.15);
      letter-spacing: 1px;
    }
    .remember-btn:active { transform: scale(0.95); box-shadow: 0 4px 10px rgba(255,140,66,0.3); }
    .remember-btn.learned-state {
      background: linear-gradient(135deg, #6BCB77, #4D96FF);
      box-shadow: 0 8px 20px rgba(77,150,255,0.35);
    }

    /* ===== 星星奖励动画 ===== */
    .star-burst {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none; z-index: 999;
    }
    .star-particle {
      position: absolute; font-size: 28px;
      animation: starFly 1.2s ease-out forwards; opacity: 1;
    }
    @keyframes starFly {
      0%   { transform: translate(0,0) scale(0.5) rotate(0deg); opacity: 1; }
      60%  { opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) scale(1.5) rotate(var(--tr)); opacity: 0; }
    }

    /* ===== Toast ===== */
    .toast {
      position: fixed; bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--dark); color: white;
      padding: 10px 24px; border-radius: 20px;
      font-size: 15px; font-weight: 700;
      z-index: 500; opacity: 0;
      transition: all 0.3s var(--bounce);
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ===== 底部导航 ===== */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      z-index: 100;
      background: white;
      border-top: 2px solid #F0F0FF;
      padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
      display: flex; justify-content: space-around;
      box-shadow: 0 -4px 20px rgba(0,0,100,0.08);
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 3px;
      cursor: pointer; padding: 4px 0;
      border-radius: 12px;
      transition: all 0.2s;
    }
    .nav-item:active { transform: scale(0.88); }
    .nav-item .nav-icon {
      font-size: 24px; line-height: 1;
      filter: grayscale(0.5) opacity(0.6);
      transition: all 0.2s;
    }
    .nav-item.active .nav-icon { filter: none; transform: translateY(-2px) scale(1.1); }
    .nav-item .nav-label {
      font-size: 11px; font-weight: 700;
      color: var(--light); transition: color 0.2s;
    }
    .nav-item.active .nav-label { color: var(--blue); }

    /* ===== 主内容区 ===== */
    .main-content { padding-bottom: 80px; position: relative; z-index: 1; }

    /* ===== 卡通吉祥物 ===== */
    .mascot-section {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px;
      background: white; border-radius: 20px;
      margin: 8px 16px 4px;
      box-shadow: var(--card-shadow);
    }
    .mascot-avatar {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, #FFD93D, #FF8C42);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
      box-shadow: 0 4px 12px rgba(255,140,66,0.3);
      animation: mascotBob 2s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes mascotBob {
      0%, 100% { transform: translateY(0) rotate(-3deg); }
      50%       { transform: translateY(-5px) rotate(3deg); }
    }
    .mascot-bubble {
      flex: 1;
      background: #F5F0FF; border-radius: 16px;
      padding: 10px 14px;
      position: relative;
      font-size: 14px; font-weight: 600;
      color: var(--dark); line-height: 1.5;
    }
    .mascot-bubble::before {
      content: '';
      position: absolute; left: -8px; top: 50%;
      transform: translateY(-50%);
      width: 0; height: 0;
      border-right: 10px solid #F5F0FF;
      border-top: 7px solid transparent;
      border-bottom: 7px solid transparent;
    }

    /* ===== 统计栏 ===== */
    .stats-row { display: flex; gap: 10px; padding: 8px 16px; }
    .stat-card {
      flex: 1; background: white;
      border-radius: 16px; padding: 12px 8px;
      text-align: center;
      box-shadow: 0 4px 12px rgba(0,0,100,0.07);
    }
    .stat-num { font-size: 24px; font-weight: 900; line-height: 1; }
    .stat-label { font-size: 11px; color: var(--mid); margin-top: 3px; font-weight: 600; }

    /* ===== 关闭按钮 ===== */
    .close-btn {
      position: absolute; top: 16px; right: 16px;
      width: 36px; height: 36px;
      border-radius: 50%; background: #F0F0F8; border: none;
      font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--mid); transition: all 0.2s;
    }
    .close-btn:active { transform: scale(0.85); background: #E0E0F0; }

    /* ===== 加载状态 ===== */
    .loading-hint {
      font-size: 12px; color: var(--mid); margin-top: 8px;
      text-align: center;
    }

    /* ===== 空状态 ===== */
    .empty-state { text-align: center; padding: 40px 20px; color: var(--mid); }
    .empty-state .empty-icon { font-size: 60px; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; font-weight: 600; }

    /* ===== 响应式 ===== */
    @media (max-width: 360px) {
      .hanzi-grid { grid-template-columns: repeat(3, 1fr); }
      .card-char { font-size: 26px; }
    }
  </style>
</head>
<body>

<!-- 顶部导航 -->
<nav class="top-nav">
  <div class="nav-title"><span>🐼</span> 汉字笔顺学堂</div>
  <div class="stars-display">
    <span class="star-icon">⭐</span>
    <span class="star-count" id="starCount">0</span>
  </div>
</nav>

<div class="main-content">

  <!-- 吉祥物提示 -->
  <div class="mascot-section">
    <div class="mascot-avatar">🐼</div>
    <div class="mascot-bubble" id="mascotMsg">
      你好！我是小胖🐼，和我一起学汉字笔顺吧！点击汉字就可以开始哦～
    </div>
  </div>

  <!-- 统计栏 -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-num" style="color:#4D96FF;" id="learnedCount">0</div>
      <div class="stat-label">已学会</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" style="color:#FF8C42;" id="totalCount">0</div>
      <div class="stat-label">总字数</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" style="color:#6BCB77;" id="streakCount">0</div>
      <div class="stat-label">连续天数</div>
    </div>
  </div>

  <!-- 进度 -->
  <div class="progress-section">
    <div class="progress-label">
      <span>🌟 今日进度</span>
      <span id="progressText">0%</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <!-- 分类 -->
  <div class="category-section">
    <div class="section-title">📚 选择分类</div>
    <div class="category-scroll" id="categoryList"></div>
  </div>

  <!-- 汉字网格 -->
  <div class="hanzi-grid-section">
    <div class="section-title">✏️ 开始学习</div>
    <div class="hanzi-grid" id="hanziGrid"></div>
  </div>

</div>

<!-- 底部导航 -->
<nav class="bottom-nav">
  <div class="nav-item active" onclick="switchTab('learn',this)">
    <span class="nav-icon">✏️</span>
    <span class="nav-label">学习</span>
  </div>
  <div class="nav-item" onclick="switchTab('review',this)">
    <span class="nav-icon">🔁</span>
    <span class="nav-label">复习</span>
  </div>
  <div class="nav-item" onclick="switchTab('rank',this)">
    <span class="nav-icon">🏆</span>
    <span class="nav-label">排行</span>
  </div>
  <div class="nav-item" onclick="switchTab('me',this)">
    <span class="nav-icon">🐼</span>
    <span class="nav-label">我的</span>
  </div>
</nav>

<!-- ===== 学习弹层 ===== -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal-sheet" id="modalSheet">
    <div class="modal-handle"></div>
    <button class="close-btn" onclick="closeModal()">✕</button>

    <!-- 汉字信息 -->
    <div class="modal-header">
      <div class="modal-char-big" id="modalCharBig">字</div>
      <div class="modal-char-info">
        <h2 id="modalCharTitle">汉字</h2>
        <span class="pinyin-tag" id="modalPinyin">pīn yīn</span>
        <span class="stroke-count-tag" id="modalStrokeCount">x画</span>
      </div>
    </div>

    <!-- 笔顺动画区 -->
    <div class="stroke-canvas-wrap">
      <div class="canvas-label">
        ✏️ 笔顺动画
        <span id="strokeStep"></span>
      </div>

      <!-- Hanzi Writer 挂载点（含田字格叠层） -->
      <div style="position:relative; width:220px; height:220px;">
        <!-- 田字格 SVG 背景 -->
        <svg class="tian-grid-overlay" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
          <rect x="5" y="5" width="210" height="210" rx="8"
                fill="none" stroke="#C0C0D8" stroke-width="2"/>
          <line x1="110" y1="5" x2="110" y2="215"
                stroke="#D8D8EE" stroke-width="1" stroke-dasharray="5,5"/>
          <line x1="5" y1="110" x2="215" y2="110"

const state = {
  stars:           parseInt(localStorage.getItem('stars') || '0'),
  learned:         JSON.parse(localStorage.getItem('learnedChars') || '[]'),
  currentCategory: 'all',
  currentChar:     null,
  streak:          parseInt(localStorage.getItem('streak') || '1'),
  // Hanzi Writer 实例
  writer:          null,
  writerReady:     false,
  strokeCount:     0,
  currentStroke:   -1,
  isAnimating:     false,
};

// ============================================================
//  初始化
// ============================================================
function init() {
  renderCategories();
  renderGrid();
  updateStats();
  updateStarDisplay();
}

function getAllChars() {
  if (state.currentCategory === 'all') return Object.keys(HANZI_META);
  const cat = CATEGORIES.find(c => c.id === state.currentCategory);
  if (!cat || !cat.chars) return Object.keys(HANZI_META);
  return cat.chars.filter(c => HANZI_META[c]);
}

// ============================================================
//  渲染分类
// ============================================================
function renderCategories() {
  document.getElementById('categoryList').innerHTML = CATEGORIES.map(cat => {
    const count = cat.id === 'all' ? Object.keys(HANZI_META).length : (cat.chars ? cat.chars.filter(c => HANZI_META[c]).length : 0);
    return `
    <button class="cat-btn ${cat.id === state.currentCategory ? 'active' : ''}"
      onclick="selectCategory('${cat.id}')">
      ${cat.emoji} ${cat.name}<span style="font-size:11px;opacity:0.75;margin-left:3px;">${count}</span>
    </button>`;
  }).join('');
}

function selectCategory(id) {
  state.currentCategory = id;
  renderCategories();
  renderGrid();
  updateStats();
  const msgs = ['来学这一组吧！✨', '这一组很有趣哦！🌟', '加油，你最棒！💪', '每天学一点越来越厉害！🎉'];
  setMascotMsg(msgs[Math.floor(Math.random() * msgs.length)]);
}

// ============================================================
//  渲染汉字网格
// ============================================================
const CARD_COLORS = ['color-1','color-2','color-3','color-4','color-5','color-6'];

function renderGrid() {
  const chars = getAllChars();
  document.getElementById('totalCount').textContent = chars.length;
  const el = document.getElementById('hanziGrid');
  if (chars.length === 0) {
    el.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="empty-icon">🤔</div><p>这个分类还没有汉字哦</p></div>`;
    return;
  }
  el.innerHTML = chars.map((char, i) => {
    const data = HANZI_META[char];
    const isLearned = state.learned.includes(char);
    return `
      <div class="hanzi-card ${CARD_COLORS[i % 6]} ${isLearned ? 'learned' : ''}"
           onclick="openChar('${char}')">
        <div class="card-char">${char}</div>
        <div class="card-pinyin">${data.pinyin}</div>
        ${isLearned ? '<div class="card-badge">✅</div>' : ''}
      </div>`;
  }).join('');
}

// ============================================================
//  统计
// ============================================================
function updateStats() {
  const chars = getAllChars();
  const learnedInCat = chars.filter(c => state.learned.includes(c)).length;
  document.getElementById('learnedCount').textContent = state.learned.length;
  document.getElementById('totalCount').textContent  = chars.length;
  document.getElementById('streakCount').textContent = state.streak;
  const pct = chars.length > 0 ? Math.round(learnedInCat / chars.length * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = pct + '%';
}
function updateStarDisplay() {
  document.getElementById('starCount').textContent = state.stars;
}

// ============================================================
//  打开汉字弹层 & 创建 Hanzi Writer 实例
// ============================================================
function openChar(char) {
  const meta = HANZI_META[char];
  if (!meta) return;

  state.currentChar  = char;
  state.writerReady  = false;
  state.strokeCount  = 0;
  state.currentStroke = -1;
  state.isAnimating  = false;

  // 基础信息
  document.getElementById('modalCharBig').textContent   = char;
  document.getElementById('modalCharTitle').textContent = char + ' — ' + meta.meaning;
  document.getElementById('modalPinyin').textContent    = meta.pinyin;
  document.getElementById('modalStrokeCount').textContent = '? 画';
  document.getElementById('strokeStep').textContent     = '';
  document.getElementById('loadingHint').style.display  = 'block';
  document.getElementById('strokeIndicators').innerHTML = '';

  // 记住按钮
  const remBtn = document.getElementById('rememberBtn');
  if (state.learned.includes(char)) {
    remBtn.classList.add('learned-state');
    remBtn.innerHTML = '<span>✅</span> 已学会！';
  } else {
    remBtn.classList.remove('learned-state');
    remBtn.innerHTML = '<span>🌟</span> 我记住了！';
  }

  setMascotMsg(`正在学"${char}"，${meta.meaning}，${meta.pinyin}，笔顺动画马上开始！`);

  // 先展示弹层
  document.getElementById('modalOverlay').classList.add('active');

  // 销毁旧 writer（如有），清空容器
  const container = document.getElementById('hanziWriterContainer');
  container.innerHTML = '';
  state.writer = null;

  // 延迟一帧再创建（等容器尺寸稳定）
  requestAnimationFrame(() => {
    createWriter(char);
  });
}

// ============================================================
//  创建 Hanzi Writer 实例
// ============================================================
function createWriter(char) {
  // 容器保证 220×220
  const container = document.getElementById('hanziWriterContainer');
  container.style.width  = '220px';
  container.style.height = '220px';

  state.writer = HanziWriter.create('hanziWriterContainer', char, {
    width:  220,
    height: 220,
    padding: 10,
    showOutline: true,
    outlineColor: '#DDDDEE',
    strokeColor: '#3A3A5C',
    radicalColor: '#3A3A5C',
    highlightColor: '#FF5A5F',
    showCharacter: false,
    strokeAnimationSpeed: 1,
    delayBetweenStrokes: 400,
    charDataLoader: function(char, onComplete) {
      const url = `https://cdn.jsdelivr.net/npm/hanzi-writer-data@2.0/${encodeURIComponent(char)}.json`;
      fetch(url)
        .then(r => {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.json();
        })
        .then(data => onComplete(data))
        .catch(err => {
          console.warn('笔顺数据加载失败:', char, err);
          document.getElementById('loadingHint').textContent = '😢 该字数据暂不可用';
        });
    },
    onLoadCharDataSuccess: function(data) {
      state.writerReady = true;
      state.strokeCount = data.strokes.length;
      document.getElementById('modalStrokeCount').textContent = data.strokes.length + ' 画';
      document.getElementById('loadingHint').style.display = 'none';
      updateStrokeNameChips(data.strokes.length);
      renderStrokeDots(data.strokes.length);

      // 自动播放
      setTimeout(() => doPlay(), 300);
    },
    onLoadCharDataError: function(reason) {
      document.getElementById('loadingHint').textContent = '😢 笔顺数据加载失败，请检查网络';
    }
  });
}

// ============================================================
//  笔画序号点 & 名称同步
// ============================================================
function renderStrokeDots(count) {
  document.getElementById('strokeIndicators').innerHTML =
    Array.from({ length: count }, (_, i) =>
      `<div class="stroke-dot" id="dot${i}">${i+1}</div>`
    ).join('');
}

function updateStrokeNameChips(count) { /* 已移除笔画名称展示 */ }

function setDotState(idx, state_name) {
  const dot = document.getElementById('dot' + idx);
  if (!dot) return;
  dot.classList.remove('current', 'done');
  if (state_name) dot.classList.add(state_name);
}

function setChipActive(idx) { /* 已移除 */ }

function syncIndicatorToStroke(strokeIdx) {
  for (let i = 0; i < strokeIdx; i++) setDotState(i, 'done');
  setDotState(strokeIdx, 'current');
  document.getElementById('strokeStep').textContent =
    `第 ${strokeIdx + 1}/${state.strokeCount} 笔`;
}

// ============================================================
//  控制按钮
// ============================================================

function doPlay() {
  if (!state.writerReady || !state.writer) {
    showToast('⏳ 数据加载中，请稍候…');
    return;
  }
  // 暂停逻辑：取消当前动画，保持已画笔画
  if (state.isAnimating) {
    try {
      state.writer.pauseAnimation();
    } catch(e) {
      try { state.writer.cancelAnimation(); } catch(e2) {}
    }
    state.isAnimating = false;
    document.getElementById('playBtn').textContent = '▶ 继续';
    return;
  }

  // 播放/重新播放
  state.currentStroke = -1;
  state.isAnimating   = true;
  document.getElementById('playBtn').textContent = '⏸ 暂停';
  document.querySelectorAll('.stroke-dot').forEach(d => d.classList.remove('current','done'));
  document.getElementById('strokeStep').textContent = '';

  state.writer.animateCharacter({
    onComplete: function() {
      state.isAnimating   = false;
      state.currentStroke = state.strokeCount - 1;
      document.getElementById('playBtn').textContent = '▶ 重播';
      document.getElementById('strokeStep').textContent = '完成！🎉';
      for (let i = 0; i < state.strokeCount; i++) setDotState(i, 'done');
      showToast('🎊 写完啦，真棒！');
    },
    onStrokeComplete: function(strokeNum, numStrokes) {
      const idx = strokeNum - 1;
      state.currentStroke = idx;
      syncIndicatorToStroke(idx);
    }
  });
}

function doNext() {
  if (!state.writerReady || !state.writer) {
    showToast('⏳ 数据加载中，请稍候…');
    return;
  }
  if (state.isAnimating) return;

  const next = state.currentStroke + 1;
  if (next >= state.strokeCount) {
    showToast('🎉 所有笔画都写完啦！');
    document.getElementById('strokeStep').textContent = '完成！🎉';
    return;
  }

  state.currentStroke = next;
  syncIndicatorToStroke(next);

  state.writer.animateStroke(next, {
    onComplete: function() {}
  });
}

function doReset() {
  if (!state.writer) {
    showToast('⏳ 数据加载中，请稍候…');
    return;
  }
  // 取消正在进行的动画
  try { state.writer.cancelAnimation(); } catch(e) {}
  try { state.writer.pauseAnimation(); } catch(e) {}

  state.isAnimating   = false;
  state.currentStroke = -1;
  document.getElementById('playBtn').textContent      = '▶ 播放';
  document.getElementById('strokeStep').textContent   = '';
  document.querySelectorAll('.stroke-dot').forEach(d => d.classList.remove('current','done'));
  // 隐藏已画笔画，重新显示轮廓
  state.writer.hideCharacter({ duration: 0 });
  setTimeout(() => {
    state.writer.showOutline({ duration: 200 });
  }, 50);
}

function markLearned() {
  const char = state.currentChar;
  if (!char) return;
  if (!state.learned.includes(char)) {
    state.learned.push(char);
    localStorage.setItem('learnedChars', JSON.stringify(state.learned));
    state.stars += 3;
    localStorage.setItem('stars', state.stars);
    updateStarDisplay();
    spawnStars();
    showToast('🌟 太棒了！获得3颗星！');
    const remBtn = document.getElementById('rememberBtn');
    remBtn.classList.add('learned-state');
    remBtn.innerHTML = '<span>✅</span> 已学会！';
    updateStats();
    renderGrid();
    setMascotMsg(`哇！你学会了"${char}"！继续加油吧！🎉`);
  } else {
    showToast('✅ 这个字你已经学会啦！');
  }
}

// ============================================================
//  星星爆炸特效
// ============================================================
function spawnStars() {
  const burst = document.getElementById('starBurst');
  const emojis = ['⭐','🌟','✨','💫','🎉','🎊'];
  const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
  for (let i = 0; i < 14; i++) {
    const el = document.createElement('div');
    el.className = 'star-particle';
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    const angle = (i / 14) * 360 + Math.random() * 30;
    const dist  = 80 + Math.random() * 160;
    el.style.left = cx + 'px';
    el.style.top  = cy + 'px';
    el.style.setProperty('--tx', Math.cos(angle * Math.PI / 180) * dist + 'px');
    el.style.setProperty('--ty', (Math.sin(angle * Math.PI / 180) * dist - 80) + 'px');
    el.style.setProperty('--tr', (Math.random() * 360 - 180) + 'deg');
    el.style.animationDelay = (Math.random() * 0.3) + 's';
    burst.appendChild(el);
    setTimeout(() => el.remove(), 1600);
  }
}

// ============================================================
//  关闭弹层
// ============================================================
function closeModal() {
  if (state.writer) {
    try { state.writer.cancelAnimation(); } catch(e) {}
  }
  state.isAnimating = false;
  document.getElementById('modalOverlay').classList.remove('active');
}
function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

// ============================================================
//  Toast / 吉祥物
// ============================================================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
function setMascotMsg(msg) {
  document.getElementById('mascotMsg').textContent = msg;
}

// ============================================================
//  底部 Tab 切换
// ============================================================
function switchTab(tab, el) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  const msgs = {
    learn:  '点击汉字卡片开始学习笔顺！✏️',
    review: '复习一下学过的字吧！🔁',
    rank:   '看看谁的星星最多！🏆',
    me:     '这是你的个人空间！🐼'
  };
  setMascotMsg(msgs[tab] || '');
  if (tab !== 'learn') showToast('🚧 该功能即将推出！');
}

// ============================================================
//  触摸下滑关闭弹层
// ============================================================
let touchStartY = 0;
document.getElementById('modalSheet').addEventListener('touchstart', e => {
  touchStartY = e.touches[0].clientY;
}, { passive: true });
document.getElementById('modalSheet').addEventListener('touchmove', e => {
  if (e.touches[0].clientY - touchStartY > 60) closeModal();
}, { passive: true });

// ============================================================
//  启动
// ============================================================
init();
</script>
</body>
